<!--
Часть 2. Упражнение 8.
Напишите функцию invokeAfterDelay, возвращающую Promise,
который вызывает заданную функцию с заданной задержкой.
Продемонстрируйте её работу, возвращая Promise, содержащий
случайное число от 0 до 1. Полученный результат печатайте в консоли.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Лаб 0.2 — Упр. 8 (invokeAfterDelay)</title>
  <style>
    body {
      font-family: Consolas, monospace;
      max-width: 650px;
      margin: 30px auto;
      padding: 0 15px;
    }
    h2 {
      text-align: center;
      color: #2c3e50;
    }
    .demo {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
    }
    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #2980b9;
    }
    #log {
      margin-top: 20px;
      padding: 12px;
      background: #e8f4fc;
      border-radius: 6px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h2>Упражнение 8. invokeAfterDelay (Promise + задержка)</h2>

  <div class="demo">
    <label for="delayInput">Задержка (мс):</label>
    <input type="number" id="delayInput" value="1500" min="100">

    <button onclick="runDemo()">Запустить invokeAfterDelay</button>
    <p><em>Результат будет выведен в консоль браузера и ниже.</em></p>
  </div>

  <div id="log"></div>

  <script>
    // === ФУНКЦИЯ invokeAfterDelay ===
    function invokeAfterDelay(fn, delay) {
      return new Promise((resolve) => {
        setTimeout(() => {
          const result = fn();
          resolve(result);
        }, delay);
      });
    }

    // === ДЕМОНСТРАЦИЯ ===
    function runDemo() {
      const delay = parseInt(document.getElementById("delayInput").value);
      const logEl = document.getElementById("log");

      if (isNaN(delay) || delay <= 0) {
        logEl.textContent = "Ошибка: введите корректную задержку.";
        return;
      }

      logEl.textContent = `Запуск... Ожидание ${delay} мс...\n`;

      // Функция, возвращающая случайное число от 0 до 1
      const getRandom = () => Math.random();

      // Используем invokeAfterDelay
      invokeAfterDelay(getRandom, delay)
        .then(result => {
          const msg = `✅ Получено случайное число: ${result}`;
          logEl.textContent += msg;
          console.log(msg); // вывод в консоль, как требует задание
        });
    }

    // Поддержка Enter
    document.getElementById("delayInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") runDemo();
    });
  </script>
</body>
</html>
