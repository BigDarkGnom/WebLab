<!--
Часть 2. Упражнение 1.
Дан список стран и городов каждой страны. Затем даны названия городов.
Для каждого города укажите, в какой стране он находится.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Лаб 0.2 — Упр. 1 (СНГ)</title>
  <style>
    /* Стили для улучшения читаемости и эстетики интерфейса */
    body {
      font-family: Arial, sans-serif; /* Используется стандартный беззасечковый шрифт для лучшей читаемости на экране */
      max-width: 850px; /* Ограничивает ширину контента для удобства восприятия */
      margin: 20px auto; /* Центрирует блок по горизонтали */
      padding: 0 15px; /* Добавляет отступы по краям на маленьких экранах */
      line-height: 1.5; /* Улучшает читаемость текста за счёт увеличенного межстрочного интервала */
    }
    h2 {
      text-align: center; /* Центрирует заголовок */
      color: #2c3e50; /* Приглушенный сине-серый цвет для заголовка */
    }
    #citiesList {
      background: #f8f9fa; /* Светлый фон для выделения списка городов */
      padding: 14px;
      border-radius: 8px; /* Скругление углов */
      margin: 20px 0; /* Отступ сверху и снизу */
      border: 1px solid #e0e0e0; /* Тонкая рамка */
    }
    label {
      display: block; /* Обеспечивает блочное отображение метки */
      margin-top: 20px; /* Отступ сверху */
      font-weight: bold; /* Жирное начертание */
      color: #333; /* Тёмно-серый цвет текста */
    }
    input, button {
      width: 100%; /* Занимают всю ширину родительского контейнера */
      padding: 10px;
      margin-top: 8px;
      box-sizing: border-box; /* Включает padding и border в общую ширину элемента */
      font-size: 16px; /* Удобный размер шрифта для ввода */
      border: 1px solid #ccc; /* Серая рамка */
      border-radius: 4px; /* Лёгкое скругление */
    }
    button {
      background: #3498db; /* Синий фон кнопки */
      color: white; /* Белый текст */
      cursor: pointer; /* Изменение курсора при наведении */
      border: none; /* Без рамки */
      margin-top: 15px; /* Отступ сверху */
    }
    button:hover {
      background: #2980b9; /* Более тёмный оттенок синего при наведении */
    }
    #result {
      margin-top: 20px;
      padding: 14px;
      background: #e8f4fc; /* Очень светлый голубой фон для результата */
      border-radius: 6px;
      font-weight: bold;
      color: #2c3e50;
      border-left: 4px solid #3498db; /* Акцентная левая полоса */
    }
  </style>
</head>
<body>
  <h2>Упражнение 1. Страны и города СНГ</h2>

  <p><strong>Доступные города (страны СНГ):</strong></p>
  <div id="citiesList"></div> <!-- Сюда будет вставлен отсортированный список всех городов -->

  <!-- Поле ввода для названия города -->
  <label for="cityInput">Введите название города:</label>
  <input type="text" id="cityInput" placeholder="Например: Минск, Ташкент, Ереван">

  <!-- Кнопка запускает функцию поиска страны -->
  <button onclick="findCountry()">Найти страну</button>

  <!-- Сюда будет выводиться результат поиска -->
  <div id="result"></div>

  <script>
    // Объект countriesData содержит структурированные данные: для каждой страны — массив её городов.
    // Использованы страны и города из СНГ.
    const countriesData = {
      "Россия": [ "Москва", "Санкт-Петербург", "Казань", "Самара", "Ижевск" ],
      "Украина": ["Киев", "Харьков", "Одесса", "Львов", "Днепр"],
      "Беларусь": ["Минск", "Гомель", "Могилёв", "Витебск", "Гродно"],
      "Казахстан": ["Нур-Султан", "Алматы", "Шымкент", "Караганда", "Павлодар"],
      "Узбекистан": ["Ташкент", "Самарканд", "Бухара", "Наманган", "Андижан"],
      "Азербайджан": ["Баку", "Гянджа", "Сумгайыт", "Мингечевир", "Ширван"],
      "Грузия": ["Тбилиси", "Кутаиси", "Батуми", "Рустави", "Гори"],
      "Армения": ["Ереван", "Гюмри", "Ванадзор", "Абовян", "Капан"],
      "Молдова": ["Кишинёв", "Тирасполь", "Бельцы", "Бендеры", "Рыбница"],
      "Киргизия": ["Бишкек", "Ош", "Джалал-Абад", "Каракол", "Токмак"],
      "Таджикистан": ["Душанбе", "Худжанд", "Куляб", "Бохтар", "Истаравшан"],
      "Туркменистан": ["Ашхабад", "Туркменабат", "Дашогуз", "Мары", "Балканабад"]
    };

    // Создаётся Map-структура для быстрого поиска по городу.
    // Ключом выступает приведённое к нижнему регистру название города (для регистронезависимости).
    // Значение — объект с двумя полями:
    //   - originalName: оригинальное написание города (сохраняется для корректного отображения)
    //   - country: название страны, к которой город принадлежит
    const cityMap = new Map();
    const allCities = []; // Массив для хранения всех городов (используется для отображения)

    // Проход по каждой стране и её городам:
    //   - country — строка с названием страны
    //   - cities — массив городов этой страны
    for (const [country, cities] of Object.entries(countriesData)) {
      // Для каждого города в списке текущей страны:
      for (const city of cities) {
        // Добавляется запись в Map: ключ — город в нижнем регистре, значение — объект с оригинальным именем и страной
        cityMap.set(city.toLowerCase(), { originalName: city, country });
        // Город также добавляется в общий массив для последующего отображения
        allCities.push(city);
      }
    }

    // Сортировка всех городов по алфавиту с учётом русского языка
    allCities.sort((a, b) => a.localeCompare(b, 'ru'));
    // Отображение отсортированного списка в элементе с id="citiesList"
    document.getElementById("citiesList").textContent = allCities.join(", ");

    // Функция findCountry вызывается при нажатии кнопки или Enter.
    // Осуществляет поиск страны по введённому пользователем городу.
    function findCountry() {
      // Получение значения из поля ввода и удаление лишних пробелов по краям
      const input = document.getElementById("cityInput").value.trim();
      // Элемент, в который будет выводиться результат
      const resultDiv = document.getElementById("result");

      // Проверка: если ввод пустой — выводится соответствующее сообщение
      if (!input) {
        resultDiv.textContent = "Пожалуйста, введите название города.";
        return; // Прерывание выполнения функции
      }

      // Приведение введённого названия к нижнему регистру — для сравнения с ключами в cityMap
      const normalized = input.toLowerCase();
      // Поиск информации о городе в Map-структуре
      const cityInfo = cityMap.get(normalized);

      // Если город найден:
      if (cityInfo) {
        // Выводится сообщение с оригинальным написанием города (чтобы не было "МИНСК" или "минск")
        // и названием соответствующей страны
        resultDiv.textContent = `Город «${cityInfo.originalName}» находится в стране: ${cityInfo.country}`;
      } else {
        // Если город не найден — выводится уведомление об этом, сохраняя введённый пользователем текст
        resultDiv.textContent = `Город «${input}» не найден среди городов стран СНГ.`;
      }

      /*
      Альтернативный вывод, если бы cityMap хранил только строку-название страны.
      Тогда отображалось бы именно то, что ввёл пользователь, а не оригинальное написание.
      */
    }

    // Добавление обработчика события нажатия клавиши на поле ввода,
    // чтобы поддерживать поиск по нажатию клавиши Enter
    document.getElementById("cityInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") findCountry(); // Если нажата клавиша Enter — вызывается функция поиска
    });
  </script>
</body>
</html>
