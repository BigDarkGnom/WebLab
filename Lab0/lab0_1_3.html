<!--
Часть 1. Упражнение 3.
Присвойте переменной test значение «Это строка, которая формируется средствами JavaScript». 
Найдите:
• подстроки, ограниченные символами с индексами 12 и 18; 42 и 46
• индексы первого и последнего вхождения буквы «а» в данную строку; сочетания букв «ми»; 
сочетания букв «ст».
Результаты должны быть выведены на экран, каждый – в отдельной строчке, оформленной по следующему образцу:
Первое вхождение букв «ст» в данную строку начинается с индекса...(указать номер)
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Лаб 0.1 — Упр. 3</title>
</head>
<body>
  <pre id="output"></pre>

  <script>
    let test = "Это строка, которая формируется средствами JavaScript";

    let output = `Исходная строка:\n«${test}»\n\n`;

    const substr1 = test.substring(12, 18); // [12, 18)
    const substr2 = test.substring(42, 46);

    const firstA = test.indexOf("а");
    const lastA = test.lastIndexOf("а");

    const firstMi = test.indexOf("ми");
    const lastMi = test.lastIndexOf("ми");

    const firstSt = test.indexOf("ст");
    const lastSt = test.lastIndexOf("ст");

    output += `Подстрока с индексами 12–18: «${substr1}»\n`;
    output += `Подстрока с индексами 42–46: «${substr2}»\n\n`;

    output += `Первое вхождение буквы «а» в данную строку начинается с индекса ${firstA}\n`;
    output += `Последнее вхождение буквы «а» в данную строку начинается с индекса ${lastA}\n`;

    output += `Первое вхождение букв «ми» в данную строку начинается с индекса ${firstMi}\n`;
    output += `Последнее вхождение букв «ми» в данную строку начинается с индекса ${lastMi}\n`;

    output += `Первое вхождение букв «ст» в данную строку начинается с индекса ${firstSt}\n`;
    output += `Последнее вхождение букв «ст» в данную строку начинается с индекса ${lastSt}\n`;

    document.getElementById("output").textContent = output;
  </script>
</body>
</html>
